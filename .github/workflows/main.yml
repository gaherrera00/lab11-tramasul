name: Deploy One-Page Case 1

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Chave SSH
      run: |
        mkdir -p ~/.ssh && echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa && ssh-keyscan -H ${{ secrets.AWS_EC2_IP }} >> ~/.ssh/known_hosts

    - name: Construir e Atualizar o Container via Docker no EC2
      run: |
        ssh ubuntu@${{ secrets.AWS_EC2_IP }} << 'EOF'
          # Garante que o Docker está instalado na máquina virtual
          if ! command -v docker &> /dev/null; then
            sudo apt-get update && sudo apt-get install docker.io -y
          fi
          
          # Entra na pasta do projeto ou clona (ajuste o link para o seu github)
          rm -rf projeto-cloud
          git clone https://github.com/gaherrera00/lab11-tramasu.git projeto-cloud
          cd projeto-cloud
          
          # Builda a imagem usando o Dockerfile da Fase 4
          sudo docker build -t onepage-textil .
          
          # Para e remove container antigo se existir
          sudo docker stop container-onepage || true
          sudo docker rm container-onepage || true
          
          # Roda o novo container na porta 80
          sudo docker run -d -p 80:80 --name container-onepage onepage-textil
        EOF
